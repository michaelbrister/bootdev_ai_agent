name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run unit tests
        run: uv run python -m unittest discover -s calculator -p "tests.py"

      - name: Check Python syntax for tracked files
        run: uv run python -c "import py_compile, subprocess; files = subprocess.check_output(['git','ls-files','*.py'], text=True).splitlines(); [py_compile.compile(f, doraise=True) for f in files]"
